{% extends "base.html" %}
{% block title %}CesSecrets{% endblock %}
{% block content %}
    <div class="tabs">
        <button class="tab active" onclick="switchTab('create', this)">Create</button>
        <button class="tab" onclick="switchTab('get', this)">Open</button>
    </div>
    <div id="tab-create" class="tab-panel active">
        <div class="card">
            <form method="post" action="/create">
                <label for="secretKey">Secret key</label>
                <div class="password-wrap">
                    <input type="password" id="secretKey" name="secret_key" placeholder="Enter a key to encrypt the message" required>
                    <button type="button" class="toggle-pw" onclick="togglePassword(this)" aria-label="Toggle password visibility"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg></button>
                </div>
                <label for="secretMessage">Message</label>
                <textarea id="secretMessage" name="message" placeholder="Enter your secret message here..." required></textarea>
                <button type="submit" class="btn">Create</button>
            </form>
        </div>
    </div>
    <div id="tab-get" class="tab-panel">
        <div class="card">
            <form method="post" action="/get">
                <label for="secretKeyGet">Secret key</label>
                <div class="password-wrap">
                    <input type="password" id="secretKeyGet" name="secret_key" placeholder="Enter the key used to encrypt" required>
                    <button type="button" class="toggle-pw" onclick="togglePassword(this)" aria-label="Toggle password visibility"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg></button>
                </div>
                <label for="messageHash">Message hash</label>
                <input type="text" id="messageHash" name="message_hash" placeholder="Paste the message hash here" required>
                <button type="submit" class="btn">Open</button>
            </form>
        </div>
    </div>
    <script>
    function switchTab(name, tabBtn) {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
        tabBtn.classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');
    }
    </script>
{% endblock %}
