<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CesSecrets{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --c-bg: #f8f9fa;
            --c-surface: #ffffff;
            --c-text: #111827;
            --c-muted: #6b7280;
            --c-accent: #4a85f0;
            --c-accent-hover: #3b6fd4;
            --c-border: #e5e7eb;
            --c-danger: #e85a4f;
            --c-danger-bg: rgba(232,90,79,.08);
            --c-success-bg: rgba(34,197,94,.08);
            --c-success: #22c55e;
            --radius: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,.08);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--c-bg);
            color: var(--c-text);
            line-height: 1.5;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 540px;
            margin: 0 auto;
            padding: 2rem 1rem;
            flex: 1;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 1.75rem;
            margin-bottom: 2rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            animation: fadeInUp .35s ease-out both;
        }

        .card:nth-child(2) { animation-delay: .1s; }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--c-text);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card h2 .icon {
            font-size: 1.1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            color: var(--c-muted);
        }

        input, textarea {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--c-border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 1rem;
            color: var(--c-text);
            background: var(--c-bg);
            transition: border-color .15s, box-shadow .15s, transform .15s;
            margin-bottom: 1rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--c-accent);
            box-shadow: 0 0 0 3px rgba(74,133,240,.12);
            transform: translateY(-1px);
        }

        textarea { resize: vertical; min-height: 5rem; }

        .btn {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
            background: var(--c-accent);
            border: 1px solid var(--c-accent);
            border-radius: var(--radius);
            cursor: pointer;
            transition: background .15s, color .15s, transform .15s, box-shadow .15s;
        }

        .btn:hover {
            background: var(--c-accent-hover);
            border-color: var(--c-accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(74,133,240,.25);
        }

        .btn:active {
            transform: translateY(0) scale(0.97);
            box-shadow: none;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown .3s ease-out;
        }

        .alert-danger {
            background: var(--c-danger-bg);
            color: var(--c-danger);
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: var(--c-success-bg);
            color: var(--c-success);
            border: 1px solid #bbf7d0;
        }

        .alert button {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: inherit;
            padding: 0 0 0 0.75rem;
            line-height: 1;
        }

        .result { word-break: break-all; white-space: pre-wrap; }

        .copyable {
            cursor: pointer;
            transition: background .15s;
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius);
            border: 1px dashed var(--c-border);
        }
        .copyable:hover { background: var(--c-bg); }
        .copyable.copied { border-color: var(--c-success); background: var(--c-success-bg); }

        a { color: var(--c-accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .back { display: inline-block; margin-top: 1rem; font-size: 0.875rem; }

        footer {
            text-align: center;
            padding: 1.5rem 1rem;
            font-size: 0.8rem;
            color: var(--c-muted);
        }
    </style>
</head>
<body>
<div class="container">
    {% for msg in get_flashed_messages(request) %}
        <div class="alert alert-{{ msg.category }}">
            <span>{{ msg.message }}</span>
            <button onclick="this.parentElement.remove()" aria-label="Close">&times;</button>
        </div>
    {% endfor %}
    <h1>Cesium secrets</h1>
    {% block content %}{% endblock %}
</div>

</body>
</html>
