{% extends "base.html" %}
{% block title %}Secret message{% endblock %}
{% block content %}
    <div class="card">
        <h2>Secret message</h2>
        <div class="result" id="messageContent">{{ message }}</div>
        <button class="btn-secondary copy-btn" onclick="copyText(document.getElementById('messageContent').textContent, this)">Copy message</button>
        <a href="/" class="btn-secondary">&larr; Back to main</a>
    </div>
{% endblock %}
