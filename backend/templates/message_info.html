{% extends "base.html" %}
{% block title %}Message created{% endblock %}
{% block content %}
    <div class="card">
        <div class="success-header">Message created successfully</div>
        <label>Message hash</label>
        <div class="result" id="hashValue">{{ message_hash }}</div>
        <button class="btn-secondary copy-btn" onclick="copyText(document.getElementById('hashValue').textContent, this)">Copy hash</button>
        <a href="/" class="btn-secondary">&larr; Back to main</a>
    </div>
{% endblock %}
