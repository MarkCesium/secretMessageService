services:
  database:
    container_name: cessecrets-db
    image: postgres:17-bookworm
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cessecrets
    ports:
      - "5432:5432"
    volumes:
      - ./var/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 2s
      retries: 5

  app:
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"
