services:
  app:
    restart: unless-stopped
    networks:
      - shared-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cessecrets.rule=Host(`secrets.csmmark.me`)"
      - "traefik.http.routers.cessecrets.entrypoints=websecure"
      - "traefik.http.routers.cessecrets.tls.certresolver=letsencrypt"
      - "traefik.http.services.cessecrets.loadbalancer.server.port=8000"

networks:
  shared-network:
    external: true
    name: shared-network
  traefik-network:
    external: true
